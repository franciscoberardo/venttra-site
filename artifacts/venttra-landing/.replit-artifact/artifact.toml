kind = "web"
previewPath = "/"
title = "Venttra Landing"
version = "1.0.0"
id = "artifacts/venttra-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23318

[services.development]
run = "pnpm --filter @workspace/venttra-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/venttra-landing", "run", "build" ]
publicDir = "artifacts/venttra-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23318"
BASE_PATH = "/"
